version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    ignore:
      # glib 0.18.x is pinned by Tauri v2's gtk3-rs bindings.
      # Fix requires glib ≥0.20 (gtk4-rs migration, tauri PR #14684).
      # Not exploitable: get_MNV never uses glib::VariantStrIter.
      - dependency-name: glib
        versions: [">=0.19"]
      - dependency-name: glib-sys
        versions: [">=0.19"]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
