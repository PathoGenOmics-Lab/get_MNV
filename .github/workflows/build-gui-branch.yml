name: Build & Test GUI (branch)

permissions:
  contents: write

on:
  push:
    branches: [v1.1.1]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15
            rust_target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
            label: macos-arm64
          - platform: macos-15
            rust_target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
            label: macos-x86
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            args: "--target x86_64-unknown-linux-gnu"
            label: linux
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            args: "--target x86_64-pc-windows-msvc"
            label: windows

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          key: ${{ matrix.label }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      - name: Setup Python (Windows only)
        if: matrix.platform == 'windows-latest'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate Windows .ico
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow
          $py = @(
            'from PIL import Image',
            'from pathlib import Path',
            'png = Path("src-tauri/icons/icon.png")',
            'ico = Path("src-tauri/icons/icon.ico")',
            'if not png.exists(): raise SystemExit(f"Missing {png}")',
            'ico.parent.mkdir(parents=True, exist_ok=True)',
            'img = Image.open(png).convert("RGBA")',
            'sizes = [(16,16),(24,24),(32,32),(48,48),(64,64),(256,256)]',
            'img.save(ico, format="ICO", sizes=sizes)',
            'print(f"Generated {ico}")'
          )
          $py | Set-Content -Encoding utf8 gen_ico.py
          python gen_ico.py
          $confPath = "src-tauri/tauri.conf.json"
          $json = Get-Content $confPath -Raw | ConvertFrom-Json
          if (-not $json.bundle.icon) { $json.bundle.icon = @() }
          if ($json.bundle.icon -notcontains "icons/icon.ico") {
            $json.bundle.icon += "icons/icon.ico"
          }
          $json | ConvertTo-Json -Depth 100 | Set-Content -Encoding utf8 $confPath

      # Use tauri-action (same as release.yml) — handles signing, bundling, etc.
      # tagName is empty so it won't create a release, just builds
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ startsWith(matrix.platform, 'macos') && '-' || '' }}
        with:
          args: ${{ matrix.args }}
          projectPath: src-tauri

      - name: Upload all bundles
        uses: actions/upload-artifact@v4
        with:
          name: get_MNV-${{ matrix.label }}
          path: src-tauri/target/${{ matrix.rust_target }}/release/bundle/**/*
          retention-days: 14
          if-no-files-found: error
