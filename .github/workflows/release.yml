name: Build & Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15
            rust_target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - platform: macos-15
            rust_target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            args: "--target x86_64-unknown-linux-gnu"
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
            args: "--target x86_64-pc-windows-msvc"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      - name: Setup Python (Windows only)
        if: matrix.platform == 'windows-latest'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate Windows .ico
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow
          $py = @(
            'from PIL import Image',
            'from pathlib import Path',
            'png = Path("src-tauri/icons/icon.png")',
            'ico = Path("src-tauri/icons/icon.ico")',
            'if not png.exists(): raise SystemExit(f"Missing {png}")',
            'ico.parent.mkdir(parents=True, exist_ok=True)',
            'img = Image.open(png).convert("RGBA")',
            'sizes = [(16,16),(24,24),(32,32),(48,48),(64,64),(256,256)]',
            'img.save(ico, format="ICO", sizes=sizes)',
            'print(f"Generated {ico}")'
          )
          $py | Set-Content -Encoding utf8 gen_ico.py
          python gen_ico.py
          $confPath = "src-tauri/tauri.conf.json"
          $json = Get-Content $confPath -Raw | ConvertFrom-Json
          if (-not $json.bundle.icon) { $json.bundle.icon = @() }
          if ($json.bundle.icon -notcontains "icons/icon.ico") {
            $json.bundle.icon += "icons/icon.ico"
          }
          $json | ConvertTo-Json -Depth 100 | Set-Content -Encoding utf8 $confPath

      - name: Install and build frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Build and Upload to Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Ad-hoc sign on macOS: changes "damaged" → "unidentified developer" (right-click → Open works)
          APPLE_SIGNING_IDENTITY: ${{ startsWith(matrix.platform, 'macos') && '-' || '' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "get_MNV ${{ github.ref_name }}"
          releaseBody: "See [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          args: ${{ matrix.args }}
